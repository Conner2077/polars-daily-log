<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Polars Daily Log — your day, automatically">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" fill="url(#bg)"/>

  <!-- Soft glow blobs -->
  <circle cx="950" cy="80" r="140" fill="#6366f1" opacity="0.35" filter="url(#soft)"/>
  <circle cx="1140" cy="300" r="120" fill="#8b5cf6" opacity="0.30" filter="url(#soft)"/>
  <circle cx="60"   cy="320" r="90"  fill="#3b82f6" opacity="0.25" filter="url(#soft)"/>

  <!-- Subtle horizontal grid -->
  <g stroke="#ffffff" stroke-width="0.6" opacity="0.06">
    <line x1="0" y1="90"  x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
  </g>

  <!-- Activity timeline visualization: 24 bars = a day -->
  <g transform="translate(720, 90)" fill="url(#bar)">
    <rect x="0"   y="175" width="10" height="5"  rx="2"/>
    <rect x="16"  y="175" width="10" height="5"  rx="2"/>
    <rect x="32"  y="175" width="10" height="5"  rx="2"/>
    <rect x="48"  y="175" width="10" height="5"  rx="2"/>
    <rect x="64"  y="173" width="10" height="7"  rx="2"/>
    <rect x="80"  y="168" width="10" height="12" rx="2"/>
    <rect x="96"  y="150" width="10" height="30" rx="2"/>
    <rect x="112" y="130" width="10" height="50" rx="2"/>
    <rect x="128" y="100" width="10" height="80" rx="2"/>
    <rect x="144" y="80"  width="10" height="100" rx="2"/>
    <rect x="160" y="60"  width="10" height="120" rx="2"/>
    <rect x="176" y="85"  width="10" height="95"  rx="2"/>
    <rect x="192" y="140" width="10" height="40"  rx="2"/>
    <rect x="208" y="145" width="10" height="35"  rx="2"/>
    <rect x="224" y="90"  width="10" height="90"  rx="2"/>
    <rect x="240" y="65"  width="10" height="115" rx="2"/>
    <rect x="256" y="55"  width="10" height="125" rx="2"/>
    <rect x="272" y="72"  width="10" height="108" rx="2"/>
    <rect x="288" y="95"  width="10" height="85"  rx="2"/>
    <rect x="304" y="125" width="10" height="55"  rx="2"/>
    <rect x="320" y="145" width="10" height="35"  rx="2"/>
    <rect x="336" y="155" width="10" height="25"  rx="2"/>
    <rect x="352" y="170" width="10" height="10"  rx="2"/>
    <rect x="368" y="174" width="10" height="6"   rx="2"/>
  </g>

  <!-- Time axis hint under bars -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#64748b" opacity="0.8">
    <text x="720" y="290">00</text>
    <text x="812" y="290">06</text>
    <text x="908" y="290">12</text>
    <text x="1004" y="290">18</text>
    <text x="1080" y="290">24</text>
  </g>

  <!-- Title block -->
  <text x="80" y="140"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif"
        font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Polars Daily Log</text>

  <text x="80" y="195"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="300" fill="#cbd5e1">Your day, automatically — from activity to worklog.</text>

  <!-- Accent underline -->
  <rect x="80" y="215" width="72" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Info chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" letter-spacing="1.5" fill="#94a3b8">
    <text x="80"  y="285">100% LOCAL</text>
    <text x="200" y="285" fill="#475569">·</text>
    <text x="220" y="285">MACOS · LINUX · WINDOWS</text>
    <text x="440" y="285" fill="#475569">·</text>
    <text x="460" y="285">PYTHON · FASTAPI · VUE</text>
  </g>

  <!-- Bottom-right version-ish chip -->
  <g transform="translate(1060, 28)">
    <rect width="110" height="26" rx="13" fill="#ffffff" opacity="0.08"/>
    <text x="55" y="17" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11" font-weight="600" fill="#c7d2fe" letter-spacing="1.5">OPEN SOURCE</text>
  </g>
</svg>
