server:
  port: 8080
  host: "0.0.0.0"

monitor:
  enabled: true   # false 则为纯 server 模式（不采集本机，只接收远程 collector 数据）
  interval_sec: 30
  ocr_enabled: false
  ocr_engine: auto
  screenshot_retention_days: 7
  privacy:
    blocked_apps: []
    blocked_urls: []
  phash_enabled: true
  phash_threshold: 10
  idle_threshold_sec: 180
  # 企业微信等"反自动化"app：跳过 AppleScript 窗口/UI 探测（会导致它自退）
  # 留空 [] 就完全关闭这层保护，用来自己排查哪个 app 真的有问题
  hostile_apps_applescript:
    - wechat
    - wecom
    - 企业微信
    - 微信
    - wechatwork
    - wechatappex
  # "反截屏" app：前台是这些时跳过 screencapture
  # 排查模式：清空以验证截屏跳过是否必需
  hostile_apps_screenshot: []

git:
  repos: []

jira:
  server_url: ""
  pat: ""

llm:
  engine: kimi
  kimi:
    api_key: ""
    model: "moonshot-v1-8k"
    base_url: "https://api.moonshot.cn/v1"
  openai:
    api_key: ""
    model: "gpt-4o"
    base_url: "https://api.openai.com/v1"
  ollama:
    model: "llama3"
    base_url: "http://localhost:11434"
  claude:
    api_key: ""
    model: "claude-sonnet-4-20250514"

scheduler:
  enabled: true
  trigger_time: "18:00"

auto_approve:
  enabled: true
  trigger_time: "21:30"

embedding:
  enabled: true
  model: ""
  dimensions: 1024

system:
  language: "zh"
  data_retention_days: 90
  data_dir: ""  # 留空默认 ~/.auto_daily_log，可改为如 /opt/auto_daily_log/data
  activity_retention_days: 7   # 活动记录保留天数，超过自动移入回收站
  recycle_retention_days: 30   # 回收站保留天数，超过永久删除
